# Production overlay — NOT applied automatically.
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  app:
    build:
      target: production
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "4"
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_JSON: "true"
      LOG_LEVEL: INFO
    restart: always
