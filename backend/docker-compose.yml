services:
  postgres:
    image: postgres:16-alpine
    container_name: oneflowai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oneflowai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oneflowai}
      POSTGRES_DB: ${POSTGRES_DB:-oneflowai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oneflowai} -d ${POSTGRES_DB:-oneflowai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oneflowai

  redis:
    image: redis:7-alpine
    container_name: oneflowai_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oneflowai

  qdrant:
    image: qdrant/qdrant:latest
    container_name: oneflowai_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oneflowai

  app:
    build:
      context: .
      target: production
    container_name: oneflowai_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - oneflowai

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  oneflowai:
    driver: bridge
